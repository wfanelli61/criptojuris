version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: abogados_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: abogados_user
      POSTGRES_PASSWORD: abogados_pass
      POSTGRES_DB: abogados_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
